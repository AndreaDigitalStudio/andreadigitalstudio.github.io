---
layout: default
---

<div class="home">
    <div class="home-hero">
        <h1>{{ page.title }}</h1>
        <p>{{ page.descripcion }}</p>
    </div>

    <div class="articulos-recientes">
        <h2>Guías</h2>
        <div class="articulos-lista">
            {% assign categoria = page.categoria %}
            {% for post in site.categories[categoria] %}
            <a href="{{ post.url }}" class="articulo-item">
                <span class="art-cat">{{ post.categories | first }}</span>
                <span class="art-titulo">{{ post.title }}</span>
                <span class="art-fecha">{{ post.date | date: "%d/%m/%Y" }}</span>
            </a>
            {% endfor %}
        </div>
    </div>
</div>
