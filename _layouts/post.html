---
layout: default
---
<article class="post">
    <header class="post-header">
        <span class="post-cat">{{ page.categories | first }}</span>
        <h1 class="post-title">{{ page.title }}</h1>
        <div class="post-meta">
            <span>{{ page.date | date: "%d/%m/%Y" }}</span>
            {% if page.nivel %}<span class="post-nivel">{{ page.nivel }}</span>{% endif %}
        </div>
    </header>
    <div class="post-content">
        {{ content }}
    </div>
    <footer class="post-footer">
        <a href="/{{ page.categories | first }}" class="coming-soon-back">← {{ page.categories | first | capitalize
            }}</a>
    </footer>
</article>
